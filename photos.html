    <div class="load-more-container">
        <button id="load-more-btn" class="btn-load-more">Load More</button>
    </div>

    <script>
        const itemsPerPage = 10;

        function filterAcademicYear(year, element) {
            const allItems = Array.from(document.querySelectorAll('.album-item'));
            const btn = document.getElementById('load-more-btn');

            // Style Active TOC Card
            document.querySelectorAll('.year-album-card').forEach(c => c.classList.remove('active'));
            if(element) element.classList.add('active');

            // Hide all first
            allItems.forEach(item => {
                item.classList.add('hidden-item');
                item.classList.remove('current-filter-match');
            });

            // Filter logic
            const matched = allItems.filter(item => 
                year === 'all' || item.getAttribute('data-academic-year') === year
            );

            // Show first batch
            matched.forEach((item, index) => {
                item.classList.add('current-filter-match');
                if (index < itemsPerPage) {
                    item.classList.remove('hidden-item');
                }
            });

            updateLoadMoreState(matched);
        }

        function updateLoadMoreState(matchedList) {
            const btn = document.getElementById('load-more-btn');
            const hidden = matchedList.filter(item => item.classList.contains('hidden-item'));

            if (hidden.length > 0) {
                btn.parentElement.style.display = 'block';
                btn.onclick = function() {
                    const toReveal = hidden.splice(0, itemsPerPage);
                    toReveal.forEach(el => el.classList.remove('hidden-item'));
                    updateLoadMoreState(matchedList);
                };
            } else {
                btn.parentElement.style.display = 'none';
            }
        }

        function countAlbums() {
            ['2025-26', '2024-25'].forEach(yr => {
                const count = document.querySelectorAll(`.album-item[data-academic-year="${yr}"]`).length;
                const span = document.querySelector(`.count-tag[data-count-for="${yr}"]`);
                if(span) span.innerText = `(${count})`;
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            countAlbums();
            // Start with current academic year
            filterAcademicYear('2025-26', document.querySelector('.year-album-card'));
        });
    </script>
