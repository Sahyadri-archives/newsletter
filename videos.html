<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. FORCE THE LAYOUT TO BE FULL WIDTH & REMOVE THEME OFFSETS */
        .container-md {
            max-width: 100% !important;
            padding: 0 !important;
        }
        
        .col-xl-8.offset-xl-2, .col-lg-10.offset-lg-1 {
            max-width: 100% !important;
            margin-left: 0 !important;
            flex: 0 0 100% !important;
        }

        /* 2. THE CLEAN MARGIN CONTAINER */
        .videos-page-container {
            max-width: 1200px;
            margin: 30px auto;
            /* Ensures 5% margin on small screens, centering on large ones */
            padding-left: 5% !important;
            padding-right: 5% !important;
            box-sizing: border-box;
        }

        /* 3. FLUID VIDEO GRID */
        .video-grid {
            display: grid;
            /* auto-fill creates a responsive grid that adjusts column count */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
        }

        .video-item {
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* Video Wrapper for 16:9 Aspect Ratio */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; 
            background: #000;
            cursor: pointer;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .video-wrapper:hover {
            transform: translateY(-5px);
        }

        .video-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Play Button Overlay */
        .video-wrapper::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: white;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }

        .video-wrapper:hover::after {
            opacity: 1;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-item figcaption {
            margin-top: 12px;
            font-family: 'Amatic SC', cursive !important;
            font-size: 1.5rem !important;
            text-align: center;
            color: #404040;
            line-height: 1.2;
        }

        /* Load More Button Styling */
        .load-more-container {
            text-align: center;
            margin: 50px 0;
        }

        .btn-load-more {
            background: #6d8571;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-family: 'Amatic SC', cursive;
            font-size: 1.6rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-load-more:hover {
            background: #5a6e5d;
        }

        .hidden-item {
            display: none !important;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .videos-page-container {
                padding-left: 20px !important;
                padding-right: 20px !important;
            }
            .video-grid {
                grid-template-columns: 1fr; /* Single column on mobile */
            }
        }
    </style>
</head>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const itemsPerPage = 10;
            const btn = document.getElementById('load-more-btn');
            const allItems = Array.from(document.querySelectorAll('.video-item'));
            const totalItems = allItems.length;

            if (totalItems <= itemsPerPage) {
                if (btn) btn.parentElement.style.display = 'none';
            } else {
                for (let i = itemsPerPage; i < totalItems; i++) {
                    allItems[i].classList.add('hidden-item');
                }
            }

            if (btn) {
                btn.addEventListener('click', function() {
                    const hiddenItems = Array.from(document.querySelectorAll('.video-item.hidden-item'));
                    const batchToReveal = hiddenItems.slice(0, itemsPerPage);
                    
                    batchToReveal.forEach(item => {
                        item.classList.remove('hidden-item');
                    });

                    const remainingHidden = document.querySelectorAll('.video-item.hidden-item').length;
                    if (remainingHidden === 0) {
                        btn.parentElement.style.display = 'none';
                    }
                });
            }
        });

        function loadVideo(container) {
            const videoId = container.getAttribute('data-video');
            const iframe = document.createElement('iframe');
            iframe.setAttribute('src', `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`);
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
            iframe.setAttribute('allowfullscreen', 'true');
            
            container.innerHTML = '';
            container.appendChild(iframe);
        }
    </script>
