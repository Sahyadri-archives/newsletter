<div class="load-more-container">
    <button id="loadMoreBtn" class="load-more-btn" onclick="showMoreItems()">Load More</button>
</div>

<script>
    let currentItems = 0;
    const itemsPerLoad = 10;
    const items = document.querySelectorAll('.video-item');

    function showMoreItems() {
        let max = currentItems + itemsPerLoad;
        
        for (let i = currentItems; i < max && i < items.length; i++) {
            items[i].style.display = 'block';
        }

        currentItems = max;

        // Hide button if no more items are left
        if (currentItems >= items.length) {
            document.getElementById('loadMoreBtn').style.display = 'none';
        }
    }

    // Initial load
    showMoreItems();

    // YouTube Load Logic
    function loadVideo(container) {
        const videoId = container.getAttribute('data-video');
        const iframe = document.createElement('iframe');
        iframe.setAttribute('src', `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`);
        iframe.setAttribute('frameborder', '0');
        iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
        iframe.setAttribute('allowfullscreen', 'true');
        
        container.innerHTML = '';
        container.appendChild(iframe);
    }
</script>
