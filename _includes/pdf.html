<div class="pdf-container">
    <div class="pdf-wrapper">
        <iframe 
            src="{{ include.file | relative_url }}" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="pdf-footer">
        <div class="pdf-caption">
            {{ include.caption | default: "Document Preview" }}
        </div>
        
        <div class="pdf-actions">
            <a href="{{ include.file | relative_url }}" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="pdf-btn pdf-btn-secondary"
               title="Open in new tab">
               View Fullscreen ↗
            </a>

            <a href="{{ include.file | relative_url }}" 
               download 
               class="pdf-btn pdf-btn-primary">
               Download PDF
            </a>
        </div>
    </div>
</div>
