<div class="pdf-container">
    <div class="pdf-thumbnail">
        <a href="{{ include.pdf_path | relative_url }}" download>
            <img 
                src="{{ include.thumbnail_path | relative_url }}" 
                alt="Download PDF"
            >
        </a>
    </div>

    <div class="pdf-footer">
        <div class="pdf-actions">
            <a href="{{ include.pdf_path | relative_url }}" 
               download 
               class="pdf-btn pdf-btn-primary">
               Download PDF
            </a>
        </div>
    </div>
</div>
